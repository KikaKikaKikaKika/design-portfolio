  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      oklch(99%   0.002 192);
      --bg2:     oklch(96.5% 0.004 192);
      --bg3:     oklch(93.0% 0.007 192);
      --ink:     oklch(14%   0.008 192);
      --ink2:    oklch(42%   0.006 192);
      --ink3:    oklch(62%   0.004 192);
      --accent:  #2C22E9;
      --border:  oklch(89%   0.005 192);
      --mono:    'DM Mono', monospace;
      --sans:    'Barlow', sans-serif;
      --display: 'Impact', 'Arial Narrow', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--display); }
    a { color: inherit; text-decoration: none; }
    #root { min-height: 100vh; }
    img { display: block; }
    button { font-family: inherit; cursor: pointer; }

    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-track { display: flex; animation: marquee 32s linear infinite; width: max-content; }
    .marquee-track:hover { animation-play-state: paused; }

    @keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
    .map-tooltip { background:oklch(14% 0.008 192); color:oklch(99% 0.002 192); border:none; border-radius:6px; padding:3px 8px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.06em; box-shadow:0 2px 8px rgba(0,0,0,.18); white-space:nowrap; }
    .map-tooltip::before { display:none; }
    .leaflet-container { font-family:'Barlow',sans-serif; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    .page-enter { /* stagger handled by JS */ }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .stats-grid > div:nth-child(4) { border-top: 1px solid var(--border); }

      .hero-cards { width: 100% !important; flex: unset !important; justify-content: center; }
      .writing-card { grid-template-columns: 1fr !important; }
      .about-grid { grid-template-columns: 1fr !important; gap: 40px !important; }

    .dot-pulse { display:inline-block; width:7px; height:7px; border-radius:50%; background:#2C22E9; animation:dot-pulse 2s ease-in-out infinite; }

    .sidebar-panel { transition: transform .3s ease; }
    @media (max-width: 768px) {
      .sidebar-layout { margin-left: 0 !important; }

      .sidebar-panel.open { transform: translateX(0); }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes testimonialSlideRight { from { opacity: 0; transform: translateX(32px); } to { opacity: 1; transform: translateX(0); } }

    @keyframes cardEnter { from { transform: scale(0.91) translateY(14px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    @keyframes cardLeaveR { from { transform: translateX(0) rotate(0deg); opacity: 1; } to { transform: translateX(115%) rotate(16deg); opacity: 0; } }
    @keyframes cardLeaveL { from { transform: translateX(0) rotate(0deg); opacity: 1; } to { transform: translateX(-115%) rotate(-16deg); opacity: 0; } }

    #tweaks-panel {
      position:fixed; bottom:24px; right:24px; background:var(--ink); color:var(--bg);

    #tweaks-panel select { width:100%; background:oklch(24% 0.01 78); border:1px solid oklch(34% 0.01 78); color:var(--bg); border-radius:6px; padding:5px 8px; font-family:var(--mono); font-size:12px; }
    .tw-title { font-size:10px; opacity:.35; letter-spacing:.1em; text-transform:uppercase; margin-bottom:14px; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <div class="tw-title">⚙ Tweaks</div>
  <label>Accent color</label>
  <select id="tw-accent">
    <option value="#2C22E9">Blue</option>
    <option value="oklch(65% 0.16 55)">Warm amber</option>
    <option value="oklch(60% 0.17 260)">Soft violet</option>
    <option value="oklch(58% 0.18 20)">Terracotta</option>
  </select>
  <label>Greeting</label>
  <select id="tw-greeting">
    <option value="time">Time of day</option>
    <option value="hey">Casual — Hey!</option>
    <option value="formal">Formal — Hello</option>
  </select>
  <label>Work layout</label>
  <select id="tw-layout">
    <option value="cards">Cards grid</option>
    <option value="list">Compact list</option>
  </select>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2C22E9",
  "greeting": "time",
  "layout": "cards"
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

// ── Tweaks ─────────────────────────────────────────────────────────────
function useTweaks() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
      else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    const wire = () => {
      const accent = document.getElementById('tw-accent').value;
      const greeting = document.getElementById('tw-greeting').value;
      const layout = document.getElementById('tw-layout').value;
      document.documentElement.style.setProperty('--accent', accent);
      const next = { accent, greeting, layout };
      setT(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    };
    ['tw-accent','tw-greeting','tw-layout'].forEach(id => document.getElementById(id)?.addEventListener('change', wire));
    return () => window.removeEventListener('message', handler);
  }, []);
  return t;
}

function getGreeting(mode) {
  if (mode === 'hey') return 'Hey there 👋';
  if (mode === 'formal') return 'Hello';
  const h = new Date().getHours();
  if (h < 12) return 'Good morning 🌅';
  if (h < 18) return 'Good afternoon ☀️';
  return 'Good evening 🌙';
}

// ── Counter ─────────────────────────────────────────────────────────────
function Counter({ to, suffix = '' }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  const fired = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || fired.current) return;
      fired.current = true;
      const t0 = performance.now();
      const tick = now => {
        const p = Math.min((now - t0) / 1600, 1);
        setV(Math.round((1 - Math.pow(1 - p, 3)) * to));
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [to]);
  return <span ref={ref}>{v}{suffix}</span>;
}

// ── Sidebar Card Deck ────────────────────────────────────────────────────
function AvailableBadge() {
  return (
    <div style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--mono)', fontSize:12, color:'#2C22E9', border:'1px solid rgba(44,34,233,0.45)', borderRadius:20, padding:'5px 12px' }}>
      <span className="dot-pulse" />
      <span>Available for hire</span>
    </div>
  );
}

function SidebarCardFace({ item }) {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ height:160, overflow:'hidden', background:'var(--bg3)', flexShrink:0 }}>
        <img src={item.img} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
      </div>
      <div style={{ padding:'14px 18px 18px' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--accent)', letterSpacing:'.06em', textTransform:'uppercase', marginBottom:6, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
          {item.companies?.slice(0,2).join(' · ')}
        </div>
        <div style={{ fontSize:15, fontWeight:500, color:'var(--ink)', lineHeight:1.3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.title}</div>
        <div style={{ fontSize:13, color:'var(--ink3)', marginTop:6, lineHeight:1.55, display:'-webkit-box', WebkitBoxOrient:'vertical', WebkitLineClamp:2, overflow:'hidden' }}>{item.desc}</div>
      </div>
    </div>
  );
}

function WorkCardDeck({ onOpenWork }) {
  const [active, setActive] = useState(0);
  const total = WORK.length;

  useEffect(() => {
    const id = setInterval(() => setActive(i => (i + 1) % total), 3000);
    return () => clearInterval(id);
  }, [total]);

  // Shortest circular distance from active
  const offset = (idx) => {
    let d = ((idx - active) % total + total) % total;
    if (d > total / 2) d -= total;
    return d;
  };

  // card=220px, center at tx=55 (z:3 covers sides)
  // side cards at 75% scale: visual width=165px
  // left: tx=-14 → visual 13.5–192.5, visible 13.5–55 = ~41px (25% of 165)
  // right: tx=124 → visual 151.5–316.5, visible 275–316.5 = ~41px (25% of 165)
  const tx    = (off) => { if (off === 0) return 55; if (off === -1) return -14; if (off === 1) return 124; return off < 0 ? -250 : 360; };
  const sc    = (off) => off === 0 ? 1 : 0.75;
  const rot   = (off) => off === -1 ? -4 : off === 1 ? 4 : 0;
  const zIdx  = (off) => off === 0 ? 3 : Math.abs(off) === 1 ? 2 : 1;
  const show  = (off) => Math.abs(off) <= 1;

  return (
    <div style={{ width:330, margin:'0 auto' }}>
      <div style={{ position:'relative', height:272, marginBottom:14, overflow:'hidden' }}>
        {WORK.map((item, idx) => {
          const off = offset(idx);
          const isCenter = off === 0;
          return (
            <div key={idx} style={{
              position:'absolute', left:0, top:0, bottom:0, width:220,
              borderRadius:20,
              border: isCenter ? '2px solid var(--accent)' : '1px solid var(--border)',
              background:'var(--bg)',
              overflow:'hidden',
              cursor: isCenter ? 'pointer' : 'default',
              zIndex: zIdx(off),
              transform: `translateX(${tx(off)}px) scale(${sc(off)}) rotate(${rot(off)}deg)`,
              transition: 'transform 0.55s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.2s ease',
              boxShadow: isCenter ? '0 8px 32px oklch(0% 0 0/0.16)' : 'none',
              visibility: show(off) ? 'visible' : 'hidden',
            }}
            onClick={() => isCenter && onOpenWork(item)}
            onMouseEnter={e => { if (isCenter) e.currentTarget.style.boxShadow='0 16px 48px oklch(0% 0 0/0.26)'; }}
            onMouseLeave={e => { if (isCenter) e.currentTarget.style.boxShadow='0 8px 32px oklch(0% 0 0/0.16)'; }}>
              <SidebarCardFace item={item} />
              <div style={{
                position:'absolute', inset:0,
                background:'oklch(5% 0 0/0.48)',
                opacity: isCenter ? 0 : 1,
                transition:'opacity 0.45s ease',
                pointerEvents:'none',
              }} />
            </div>
          );
        })}
      </div>

      {/* Counter + arrows */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 2px' }}>
        <button onClick={() => setActive(i => (i - 1 + total) % total)} style={{ background:'none', border:'none', color:'var(--ink3)', cursor:'pointer', padding:'2px 6px', fontSize:15, lineHeight:1, transition:'color .15s' }}
          onMouseEnter={e=>e.currentTarget.style.color='var(--ink)'}
          onMouseLeave={e=>e.currentTarget.style.color='var(--ink3)'}
        >←</button>
        <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--ink3)' }}>
          {String(active+1).padStart(2,'0')} / {String(total).padStart(2,'0')}
        </span>
        <button onClick={() => setActive(i => (i + 1) % total)} style={{ background:'none', border:'none', color:'var(--ink3)', cursor:'pointer', padding:'2px 6px', fontSize:15, lineHeight:1, transition:'color .15s' }}
          onMouseEnter={e=>e.currentTarget.style.color='var(--ink)'}
          onMouseLeave={e=>e.currentTarget.style.color='var(--ink3)'}
        >→</button>
      </div>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────
function Sidebar({ activePage, onNavigate, onOpenWork, introPlayed }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const rLogo  = React.useRef(null);
  const rTag   = React.useRef(null);
  const rDiv   = React.useRef(null);
  const rNav   = React.useRef(null);
  const rStats = React.useRef(null);

  const navItems = [
    { label: 'Home',       page: 'home' },
    { label: 'About',      page: 'about' },
    { label: 'Work',       page: 'work' },
    { label: 'Experience', page: 'experience' },
    { label: 'Writing',    page: 'writing' },
    { label: 'Contact',    page: 'contact' },
  ];
  const go = (page) => { onNavigate(page); setMobileOpen(false); };

  // Hide on first mount if intro hasn't played yet
  React.useLayoutEffect(() => {
    if (introPlayed) return;
    [rLogo, rTag, rDiv, rStats].forEach(r => {
      if (r.current) r.current.style.opacity = '0';
    });
    if (rNav.current) Array.from(rNav.current.children).forEach(el => {
      el.style.opacity = '0'; el.style.transform = 'translateX(-8px)';
    });
  }, []);

  // Animate in when intro completes
  React.useEffect(() => {
    if (!introPlayed) return;
    const fade = (r, delay) => setTimeout(() => {
      if (!r.current) return;
      r.current.style.transition = 'opacity 0.4s ease';
      r.current.style.opacity = '1';
    }, delay);
    // Delays match hero-preview phase3 sequence (relative to introPlayed = t1750ms)
    // sLogo→1900, sTag→2020, sDiv→2100, sNav→2200+80i, sStats→2800
    const timers = [
      fade(rLogo,  1900),
      fade(rTag,   2020),
      fade(rDiv,   2100),
      fade(rStats, 2800),
    ];
    if (rNav.current) Array.from(rNav.current.children).forEach((el, i) => {
      timers.push(setTimeout(() => {
        el.style.transition = 'opacity 0.35s ease, transform 0.35s cubic-bezier(0.16,1,0.3,1)';
        el.style.opacity = '1'; el.style.transform = 'translateX(0)';
      }, 2200 + i * 80));
    });
    return () => timers.forEach(clearTimeout);
  }, [introPlayed]);

  return (
    <>
      <button className="hamburger-btn" onClick={() => setMobileOpen(!mobileOpen)} style={{
        display:'none', position:'fixed', top:16, left:16, zIndex:201,
        background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8,
        padding:'8px 10px', cursor:'pointer', alignItems:'center', justifyContent:'center',
        transition:'background .15s',
      }}
        onMouseEnter={e => e.currentTarget.style.background='var(--bg2)'}
        onMouseLeave={e => e.currentTarget.style.background='var(--bg)'}
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      {mobileOpen && <div onClick={() => setMobileOpen(false)} style={{ position:'fixed', inset:0, background:'oklch(0% 0 0/0.3)', zIndex:99 }} />}
      <aside className={`sidebar-panel${mobileOpen ? ' open' : ''}`} style={{
        position:'fixed', left:0, top:0, bottom:0, width:240,
        background:'var(--bg)', borderRight:'1px solid var(--border)',
        display:'flex', flexDirection:'column', padding:'28px 16px 24px',
        zIndex:100, overflowY:'auto',
      }}>
        <div ref={rLogo} style={{ padding:'0 8px', marginBottom:0 }}>
          <button onClick={() => go('home')} style={{
            fontFamily:'var(--display)', fontSize:18, fontWeight:900, display:'block',
            color:'var(--ink)', background:'none', border:'none', padding:0, cursor:'pointer',
            textAlign:'left', lineHeight:1.2, transition:'color .15s', letterSpacing:'.04em',
          }}
            onMouseEnter={e => e.currentTarget.style.color='var(--ink3)'}
            onMouseLeave={e => e.currentTarget.style.color='var(--ink)'}
          >KRIST&#205;NA</button>
          <div ref={rTag} style={{ fontSize:11, color:'var(--ink3)', marginTop:4, fontFamily:'var(--mono)' }}>Design & Product Leader</div>
        </div>
        <div ref={rDiv} style={{ height:1, background:'var(--border)', margin:'20px 8px 20px' }} />
        <nav ref={rNav} style={{ flex:1 }}>
          {navItems.map(item => {
            const isActive = activePage === item.page;
            return (
              <button key={item.page} onClick={() => go(item.page)} style={{
                display:'block', width:'100%', textAlign:'left',
                padding:'9px 12px', borderRadius:8, marginBottom:2, fontSize:14,
                color: isActive ? 'var(--ink)' : 'var(--ink2)',
                background: isActive ? 'var(--bg2)' : 'transparent',
                border:'none', cursor:'pointer', transition:'all .15s',
                fontFamily:'var(--sans)', fontWeight: isActive ? 500 : 400,
              }}
                onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background='var(--bg2)'; e.currentTarget.style.color='var(--ink)'; }}}
                onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--ink2)'; }}}
              >{item.label}</button>
            );
          })}
        </nav>
        <div ref={rStats} style={{ marginTop:24, background:'var(--ink)', color:'oklch(84% 0.01 78)', borderRadius:14, padding:'14px 16px', fontFamily:'var(--mono)', fontSize:11, lineHeight:1.85 }}>
          <div><span style={{ color:'var(--bg)' }}>10+ yrs</span> building things people love</div>
          <div>5 design systems <span style={{ color:'oklch(55% 0.01 78)' }}>created</span></div>
          <div>8+ products <span style={{ color:'oklch(55% 0.01 78)' }}>shipped end-to-end</span></div>
          <div>3 teams <span style={{ color:'oklch(55% 0.01 78)' }}>built & led</span></div>
          <div>1 AI Lab <span style={{ color:'oklch(55% 0.01 78)' }}>led · RAKbank 2025</span></div>
          <div style={{ marginTop:8, display:'flex', alignItems:'center', gap:8 }}>
            <span className="dot-pulse" />
            <span style={{ color:'var(--bg)' }}>available for hire</span>
          </div>
        </div>
      </aside>
    </>
  );
}

// ── Work data ─────────────────────────────────────────────────────────────
const WORK = [
  {
    title: 'Strategy',
    desc: 'Kristína establishes a clear vision across experience, product, and brand by defining goals, OKRs, and measurable actions that create alignment, strengthen collaboration, and improve engagement. See selected achievements below.',
    img: 'https://framerusercontent.com/images/gU19czU7xmbSWMe7VfugeRcY2Ck.jpg',
    accent: '265',
    companies: ['RAKbank', 'Seqera', 'Siemens Gamesa', 'Lawalist'],
    detail: {
      body: 'Establishes a clear vision across experience, product, and brand by defining goals, OKRs, and measurable actions that create alignment, strengthen collaboration, and improve engagement. See selected achievements below.',
      projects: [
        { year:'2025', company:'RAKbank', name:'UX strategy for AI Lab', tags:['Ecosystems'], desc:'Led the strategic definition and shared AI vision for a fragmented, multi-product ecosystem across a bank — aligning contributing product teams around common principles, eliminating duplicated efforts, and establishing scalable foundations for a consistent customer experience.',
          scale: [
            { label:'Multi-product', desc:'Fragmented AI ecosystem unified under one vision' },
            { label:'Cross-org', desc:'Full access across all contributing product teams' },
            { label:'Bank-wide', desc:'Aligned customer experience across the entire institution' },
          ],
          pillars: [

            { title:'Design system alignment', desc:'Proposed shared component and pattern libraries that reduce duplicated work and let teams ship consistent AI-powered interfaces faster.' },
            { title:'Conversational design guidelines', desc:'Established standards for dialogue flows, error handling, tone calibration, and human handoff — applicable across all AI-powered conversational surfaces.' },

// ── Work Detail Overlay ─────────────────────────────────────────────────
function WorkDetail({ item, onClose }) {
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    const fn = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', fn); };
  }, []);

  return (
    <div style={{ position:'fixed', inset:0, zIndex:200, display:'flex', alignItems:'flex-start', justifyContent:'flex-end' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'oklch(15% 0.012 78 / 0.45)', animation:'fadeIn 0.25s ease' }} />
      <div className="work-detail-panel" style={{ position:'relative', zIndex:1, width:'calc(100vw - 240px)', height:'100vh', background:'var(--bg)', overflowY:'auto', animation:'slideIn 0.32s cubic-bezier(0.22,1,0.36,1)', boxShadow:'-24px 0 80px oklch(0% 0 0/0.12)' }}>

          <img src={item.img} alt={item.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />

        <div style={{ padding:'40px 48px 80px' }}>
          <button onClick={onClose} style={{ background:'none', border:'1px solid var(--border)', borderRadius:8, padding:'6px 14px', fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)', marginBottom:32, display:'flex', alignItems:'center', gap:6, transition:'all .18s' }}

          {item.tag && <div style={{ fontFamily:'var(--mono)', fontSize:10, background:'var(--accent)', color:'white', borderRadius:4, padding:'2px 8px', display:'inline-block', marginBottom:12, letterSpacing:'.06em' }}>Featured</div>}

          <p style={{ fontSize:15, color:'var(--ink2)', lineHeight:1.8, textWrap:'pretty', marginBottom:40, whiteSpace:'pre-line' }}>{item.detail.body}</p>

                  <span style={{ fontSize:14, color:'var(--ink2)' }}>{p}</span>
                </div>
              ))}
            </>
          )}
          {item.href && (
            <div style={{ marginTop:28 }}>
              {(item.href.includes('medium.com') || item.href.includes('dribbble.com'))
                ? <ExternalLinkCard href={item.href} label={item.hrefLabel || 'View →'} title={item.title} />

// ── ScrollToTop ──────────────────────────────────────────────────────────
function ScrollToTop() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 300);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <button
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      style={{
        position: 'fixed', bottom: 32, right: 32,
        width: 44, height: 44, borderRadius: '50%',
        background: 'var(--ink)', color: 'var(--bg)',
        border: 'none', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        opacity: visible ? 1 : 0,
        pointerEvents: visible ? 'auto' : 'none',
        transition: 'opacity .25s, transform .15s ease',
        zIndex: 999,
      }}
      onMouseEnter={e => e.currentTarget.style.transform='scale(1.1)'}
      onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}
      aria-label="Back to top"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  );
}

function WorkMap({ filteredExp, highlightLocs }) {
  const containerRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const markersRef = React.useRef([]);

  const makeIcon = (highlighted, dimmed) => L.divIcon({
    className: '',
    html: highlighted
      ? `<div style="width:14px;height:14px;border-radius:50%;background:#2C22E9;border:3px solid white;box-shadow:0 2px 12px rgba(0,0,0,.4)"></div>`
      : `<div style="width:10px;height:10px;border-radius:50%;background:#2C22E9;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.25);opacity:${dimmed ? 0.25 : 1}"></div>`,
    iconSize: highlighted ? [14, 14] : [10, 10],
    iconAnchor: highlighted ? [7, 7] : [5, 5],
  });

  // Init map once
  React.useEffect(() => {
    if (mapRef.current || !containerRef.current) return;
    const map = L.map(containerRef.current, {
      center: [42, 8], zoom: 3,
      zoomControl: false, scrollWheelZoom: false,
      attributionControl: false, dragging: true,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    mapRef.current = map;
  }, []);

  // Update markers when filter or highlight changes
  React.useEffect(() => {
    if (!mapRef.current) return;
    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];

    const showAll = !filteredExp || filteredExp.some(e => e.worldwide);
    const visibleKeys = showAll ? null : new Set(filteredExp.flatMap(e => e.locs || []));
    const toShow = showAll ? ALL_MAP_LOCATIONS : ALL_MAP_LOCATIONS.filter(l => visibleKeys.has(l.key));
    const hasHighlight = highlightLocs && highlightLocs.length > 0;

    toShow.forEach(loc => {
      const isHighlighted = hasHighlight && highlightLocs.includes(loc.key);
      const isDimmed = hasHighlight && !isHighlighted;
      const icon = makeIcon(isHighlighted, isDimmed);
      const m = L.marker(loc.coords, { icon })
        .addTo(mapRef.current)
        .bindTooltip(loc.name, { permanent: isHighlighted || !hasHighlight, direction:'top', offset:[0, isHighlighted ? -12 : -10], className:'map-tooltip' })
        .openTooltip();
      markersRef.current.push(m);
    });
  }, [filteredExp, highlightLocs]);

  return <div ref={containerRef} style={{ width:'100%', height:'100%', minHeight:400, borderRadius:16, overflow:'hidden', border:'1px solid var(--border)' }} />;
}

// ── Work Tab Nav ───────────────────────────────────────────────────────────
function WorkTabNav({ hoveredId, onHoverTab, onLeaveTab }) {
  const scrollRef = React.useRef(null);
  const [showLeft, setShowLeft] = React.useState(false);
  const [showRight, setShowRight] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(() => window.innerWidth < 640);

  const updateArrows = React.useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    setShowLeft(el.scrollLeft > 4);
    setShowRight(el.scrollLeft + el.clientWidth < el.scrollWidth - 4);
  }, []);

  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) { updateArrows(); el.addEventListener('scroll', updateArrows, { passive:true }); }
    const onResize = () => { setIsMobile(window.innerWidth < 640); updateArrows(); };
    window.addEventListener('resize', onResize);
    return () => { el && el.removeEventListener('scroll', updateArrows); window.removeEventListener('resize', onResize); };
  }, [updateArrows]);

  const scrollToItem = (id) => {
    const el = document.getElementById('work-' + id);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  };

  const nudge = (dir) => {
    if (scrollRef.current) scrollRef.current.scrollBy({ left: dir * 160, behavior:'smooth' });
  };

  if (isMobile) {
    return (
      <div style={{ position:'sticky', top:0, zIndex:50, background:'var(--bg)', borderBottom:'1px solid var(--border)', marginBottom:32, marginLeft:-16, marginRight:-16, paddingLeft:16, paddingRight:16, paddingTop:10, paddingBottom:10 }}>
        <div style={{ position:'relative' }}>
          <select onChange={e => scrollToItem(e.target.value)} defaultValue=""
            style={{ width:'100%', fontSize:14, fontFamily:'inherit', fontWeight:500, padding:'10px 40px 10px 14px', borderRadius:10, border:'1px solid var(--border)', background:'var(--bg)', color:'var(--ink)', cursor:'pointer', appearance:'none', WebkitAppearance:'none', outline:'none' }}>
            <option value="" disabled>Jump to section…</option>
            {WORK.map((item) => {
              const id = item.title.toLowerCase().replace(/[\s&]+/g, '-');
              return <option key={id} value={id}>{item.title}</option>;
            })}
          </select>
          <span style={{ position:'absolute', right:14, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', color:'var(--ink3)', fontSize:12 }}>▾</span>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position:'sticky', top:0, zIndex:50, background:'var(--bg)', borderBottom:'1px solid var(--border)', marginBottom:32, marginLeft:-32, marginRight:-32 }}>
      <div style={{ position:'relative', display:'flex', alignItems:'center' }}>
        {showLeft && (
          <button onClick={() => nudge(-1)} style={{ position:'absolute', left:24, zIndex:2, top:'50%', transform:'translateY(-50%)', width:28, height:28, borderRadius:'50%', border:'1px solid var(--border)', cursor:'pointer', background:'var(--bg)', color:'var(--ink)', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px oklch(0% 0 0/0.1)', flexShrink:0 }}>‹</button>
        )}
        <div ref={scrollRef} style={{ display:'flex', gap:2, overflowX:'auto', scrollbarWidth:'none', paddingTop:10, paddingBottom:10, paddingLeft: showLeft ? 64 : 32, paddingRight: showRight ? 64 : 32, flex:1 }}>
          {WORK.map((item) => {
            const id = item.title.toLowerCase().replace(/[\s&]+/g, '-');
            const isHovered = hoveredId === id;
            return (
              <button key={id} onClick={() => scrollToItem(id)}
                onMouseEnter={() => onHoverTab(id)} onMouseLeave={() => onLeaveTab()}
                style={{
                  fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.05em', whiteSpace:'nowrap',
                  padding:'5px 14px', borderRadius:20, cursor:'pointer', transition:'all .2s',
                  border: isHovered ? 'none' : '1px solid transparent',
                  background: isHovered ? 'var(--accent)' : 'transparent',
                  color: isHovered ? 'white' : 'var(--ink3)',
                }}
              >
                {item.title}
              </button>
            );
          })}
        </div>
        {showRight && (
          <button onClick={() => nudge(1)} style={{ position:'absolute', right:24, zIndex:2, top:'50%', transform:'translateY(-50%)', width:28, height:28, borderRadius:'50%', border:'1px solid var(--border)', cursor:'pointer', background:'var(--bg)', color:'var(--ink)', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px oklch(0% 0 0/0.1)', flexShrink:0 }}>›</button>
        )}
      </div>
    </div>
  );
}

// ── IntroOverlay ─────────────────────────────────────────────────────────
function IntroOverlay({ onDone }) {
  const bgRef   = React.useRef(null);
  const wordRef = React.useRef(null);

  React.useEffect(() => {
    const bg   = bgRef.current;
    const word = wordRef.current;
    if (!bg || !word) return;
    const timers = [];
    const T = (fn, ms) => timers.push(setTimeout(fn, ms));

    // Phase 1: Welcome scales in
    T(() => {
      word.style.transition = 'transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease';
      word.style.transform  = 'translate(-50%, -50%) scale(1)';
      word.style.opacity    = '1';
    }, 80);

    // Phase 2: blue brightens to white + Welcome travels to heading
    T(() => {
      bg.style.transition = 'opacity 1.0s ease-in-out';
      bg.style.opacity    = '0';

      const target = document.querySelector('[data-intro-target]');
      if (target) {
        const wRect = target.getBoundingClientRect();
        const sRect = word.getBoundingClientRect();
        const dx    = (wRect.left + wRect.width  / 2) - (sRect.left + sRect.width  / 2);
        const dy    = (wRect.top  + wRect.height / 2) - (sRect.top  + sRect.height / 2);
        const scale = wRect.width / sRect.width;
        word.style.transition = 'transform 0.9s cubic-bezier(0.76,0,0.24,1), opacity 0.25s ease 0.7s';
        word.style.transform  = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(${scale})`;
      }
      word.style.opacity = '0';
    }, 950);

    T(onDone, 1750);
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <>
      <div ref={bgRef} style={{
        position:'fixed', inset:0, background:'var(--accent)',
        zIndex:200, pointerEvents:'none',
      }} />
      <div ref={wordRef} style={{
        position:'fixed', top:'50%', left:'50%',
        transform:'translate(-50%, -50%) scale(0.88)',
        fontFamily:'var(--display)', fontSize:'clamp(90px, 18vw, 240px)',
        fontWeight:900, letterSpacing:'-0.01em', lineHeight:1,
        color:'#ffffff', whiteSpace:'nowrap',
        zIndex:201, pointerEvents:'none', opacity:0,
        willChange:'transform, opacity',
      }}>Welcome</div>
    </>
  );
}

// ── StaggerChildren ──────────────────────────────────────────────────────
// Animates direct children (or grandchildren if single wrapper div) in sequence
function StaggerChildren({ children, startDelay = 0, skip = false }) {
  const ref = React.useRef(null);
  React.useLayoutEffect(() => {
    if (skip || !ref.current) return;
    const direct = Array.from(ref.current.children);
    // If the page returns a single wrapper div, animate its children; otherwise animate direct children
    const items = (direct.length === 1 && direct[0].tagName === 'DIV')
      ? Array.from(direct[0].children)
      : direct;
    // Set hidden before paint
    items.forEach(item => {
      item.style.opacity = '0';
      item.style.transform = 'translateY(20px)';
    });
    // Stagger reveal
    const timers = items.map((item, i) =>
      setTimeout(() => {
        item.style.transition = 'opacity 0.52s cubic-bezier(0.16,1,0.3,1), transform 0.52s cubic-bezier(0.16,1,0.3,1)';
        item.style.opacity = '1';
        item.style.transform = 'translateY(0)';
      }, startDelay + i * 115)
    );
    return () => timers.forEach(clearTimeout);
  }, []);
  return <div className="page-enter" ref={ref}>{children}</div>;
}

// ── App ─────────────────────────────────────────────────────────────────
function App() {
  const tweaks = useTweaks();
  const [activePage, setActivePage] = useState('home');
  const [openItem, setOpenItem] = useState(null);
  const [introPlayed, setIntroPlayed] = useState(false);
  const [expFilter, setExpFilter] = useState(null);

  const navigate = (page) => {
    setActivePage(page);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  return (
    <>
      <Sidebar activePage={activePage} onNavigate={navigate} onOpenWork={setOpenItem} introPlayed={introPlayed} />
      <div className="sidebar-layout" style={{ marginLeft:240, minHeight:'100vh', display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'0 40px', flex:1 }}>

          {openItem && <WorkDetail item={openItem} onClose={() => setOpenItem(null)} />}

          {!introPlayed && <IntroOverlay onDone={() => setIntroPlayed(true)} />}

          <StaggerChildren key={activePage} skip={activePage === 'home'}>
            {activePage === 'home'       && <HomePage       tweaks={tweaks} onNavigate={navigate} onOpenWork={setOpenItem} introPlayed={introPlayed} />}
            {activePage === 'about'      && <AboutPage      onNavigate={navigate} expFilter={expFilter} setExpFilter={setExpFilter} />}
            {activePage === 'work'       && <WorkPage       tweaks={tweaks} onOpenWork={setOpenItem} />}
            {activePage === 'experience' && <ExperiencePage expFilter={expFilter} setExpFilter={setExpFilter} />}
            {activePage === 'writing'    && <WritingPage    />}
            {activePage === 'contact'    && <ContactPage    />}
          </StaggerChildren>

          <ScrollToTop />
        </div>
        <Footer />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
