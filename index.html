const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "oklch(62% 0.16 145)",
  "greeting": "time",
  "layout": "cards"
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

// ── Tweaks ─────────────────────────────────────────────────────────────
function useTweaks() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
      else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    const wire = () => {
      const accent = document.getElementById('tw-accent').value;
      const greeting = document.getElementById('tw-greeting').value;
      const layout = document.getElementById('tw-layout').value;
      document.documentElement.style.setProperty('--accent', accent);
      const next = { accent, greeting, layout };
      setT(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    };
    ['tw-accent','tw-greeting','tw-layout'].forEach(id => document.getElementById(id)?.addEventListener('change', wire));
    return () => window.removeEventListener('message', handler);
  }, []);
  return t;
}

function getGreeting(mode) {
  if (mode === 'hey') return 'Hey there 👋';
  if (mode === 'formal') return 'Hello, friend';
  const h = new Date().getHours();
  if (h < 12) return 'Good morning, friend 🌅';
  if (h < 18) return 'Good afternoon, friend ☀️';
  return 'Good evening, friend 🌙';
}

// ── Counter ─────────────────────────────────────────────────────────────
function Counter({ to, suffix = '' }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  const fired = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || fired.current) return;
      fired.current = true;
      const t0 = performance.now();
      const tick = now => {
        const p = Math.min((now - t0) / 1600, 1);
        setV(Math.round((1 - Math.pow(1 - p, 3)) * to));
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [to]);
  return <span ref={ref}>{v}{suffix}</span>;
}

// ── Work Detail Overlay ─────────────────────────────────────────────────
function WorkDetail({ item, onClose }) {
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    const fn = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', fn); };
  }, []);

  return (
    <div style={{ position:'fixed', inset:0, zIndex:200, display:'flex', alignItems:'flex-start', justifyContent:'flex-end' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'oklch(15% 0.012 78 / 0.45)', animation:'fadeIn 0.25s ease' }} />
      <div className="work-detail-panel" style={{ position:'relative', zIndex:1, width:'min(50vw, 100vw)', height:'100vh', background:'var(--bg)', overflowY:'auto', animation:'slideIn 0.32s cubic-bezier(0.22,1,0.36,1)', boxShadow:'-24px 0 80px oklch(0% 0 0/0.12)' }}>
        <div style={{ height:320, overflow:'hidden', background:'var(--bg3)' }}>
          <img src={item.img} alt={item.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
        </div>
        <div style={{ padding:'40px 48px 80px' }}>
          <button onClick={onClose} style={{ background:'none', border:'1px solid var(--border)', borderRadius:8, padding:'6px 14px', fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)', marginBottom:32, display:'flex', alignItems:'center', gap:6, transition:'all .18s' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--ink3)'; e.currentTarget.style.color='var(--ink)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--ink3)'; }}
          >← Back</button>

          {item.tag && <div style={{ fontFamily:'var(--mono)', fontSize:10, background:'var(--accent)', color:'white', borderRadius:4, padding:'2px 8px', display:'inline-block', marginBottom:12, letterSpacing:'.06em' }}>Featured</div>}
          <h2 style={{ fontSize:36, fontWeight:300, letterSpacing:'-0.025em', marginBottom:16, lineHeight:1.1 }}>{item.title}</h2>
          <p style={{ fontSize:15, color:'var(--ink2)', lineHeight:1.8, textWrap:'pretty', marginBottom:40, whiteSpace:'pre-line' }}>{item.detail.body}</p>

          {item.detail.projects && item.detail.projects.map((p, i) => (
            <div key={i} style={{
              borderTop:'1px solid var(--border)', paddingTop:28, marginTop:28,
              ...(p.featured ? { background:'var(--bg2)', borderRadius:12, padding:'24px', marginTop:28, border:'1px solid var(--border)' } : {}),
            }}>
              <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:10, flexWrap:'wrap', justifyContent:'space-between' }}>
                <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                  {p.featured && <span style={{ fontFamily:'var(--mono)', fontSize:10, background:'var(--accent)', color:'white', borderRadius:4, padding:'2px 8px', letterSpacing:'.06em' }}>Featured</span>}
                  {p.year && <span style={{ fontFamily:'var(--mono)', fontSize:10, background:'var(--bg3)', borderRadius:4, padding:'2px 8px', color:'var(--ink3)' }}>{p.year}</span>}
                  {p.company && <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--accent)' }}>{p.company}</span>}
                  {p.tags && p.tags.map((t,j) => <span key={j} style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--ink3)', border:'1px solid var(--border)', borderRadius:10, padding:'1px 8px' }}>{t}</span>)}
                </div>
              </div>
              <h3 style={{ fontSize:16, fontWeight:600, marginBottom:8 }}>{p.name}</h3>
              <p style={{ fontSize:13.5, color:'var(--ink2)', lineHeight:1.7, textWrap:'pretty' }}>{p.desc}</p>

              {p.scale && <ProjectTabs scale={p.scale} pillars={p.pillars} methods={p.methods} outcomes={p.outcomes} />}

              {(p.href || p.links) && (
                <div style={{ display:'flex', gap:24, flexWrap:'wrap', marginTop:16 }}>
                  {p.links
                    ? p.links.map((l,k) => (
                        <a key={k} href={l.href} target="_blank" rel="noopener" style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--mono)', fontSize:12, color:'var(--accent)', borderBottom:'1px solid var(--accent)', paddingBottom:2, transition:'opacity .2s' }}
                          onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
                          onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                        >{l.label}</a>
                      ))
                    : <a href={p.href} target="_blank" rel="noopener" style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--mono)', fontSize:12, color:'var(--accent)', borderBottom:'1px solid var(--accent)', paddingBottom:2, transition:'opacity .2s' }}
                        onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
                        onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                      >{p.linkLabel || 'View case study →'}</a>
                  }
                </div>
              )}
            </div>
          ))}

          {item.detail.points && !item.detail.projects && (
            <>
              <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)', letterSpacing:'.08em', textTransform:'uppercase', marginBottom:16 }}>Key capabilities</div>
              {item.detail.points.map((p, i) => (
                <div key={i} style={{ display:'flex', gap:16, padding:'13px 0', borderBottom:'1px solid var(--border)', alignItems:'center' }}>
                  <div style={{ width:6, height:6, borderRadius:'50%', background:`oklch(67% 0.14 ${item.accent})`, flexShrink:0 }} />
                  <span style={{ fontSize:14, color:'var(--ink2)' }}>{p}</span>
                </div>
              ))}
              {item.href && (
                <a href={item.href} target="_blank" rel="noopener" style={{ display:'inline-flex', alignItems:'center', gap:6, marginTop:28, fontFamily:'var(--mono)', fontSize:12, color:'var(--accent)', borderBottom:'1px solid var(--accent)', paddingBottom:2, transition:'opacity .2s' }}
                  onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                >{item.hrefLabel || 'Read article →'}</a>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ScrollToTop ──────────────────────────────────────────────────────────
function ScrollToTop() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 300);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <button
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      style={{
        position: 'fixed', bottom: 32, right: 32,
        width: 44, height: 44, borderRadius: '50%',
        background: 'var(--ink)', color: 'var(--bg)',
        border: 'none', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        opacity: visible ? 1 : 0,
        pointerEvents: visible ? 'auto' : 'none',
        transition: 'opacity .25s',
        zIndex: 999,
      }}
      aria-label="Back to top"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  );
}

            <div style={{ width:12, height:12, borderRadius:'50%', border:'2px solid var(--accent)', background:'var(--bg)', flexShrink:0, marginTop:3, position:'relative', zIndex:1 }} />
            <div style={{ paddingLeft:20 }}>
              <div style={{ fontWeight:500, fontSize:14.5, lineHeight:1.3 }}>{e.role}</div>
              <div style={{ fontSize:13, color:'var(--ink2)', marginTop:3 }}>{e.co}</div>
              <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)', marginTop:5 }}>{e.tags}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Studies */}
      <div style={{ borderTop:'1px solid var(--border)', paddingTop:56 }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--ink3)', letterSpacing:'.08em', textTransform:'uppercase', marginBottom:24 }}>Studies</div>
        {[
          { deg:"Master's — Advanced Studies in Design", school:'Polytechnic University of Catalunya', loc:'Spain' },
          { deg:"Master's — Spatial Planning & Management", school:'Slovak University of Technology', loc:'Slovakia' },
          { deg:'Expert Training — UX, Leadership & Management', school:'Nielsen Norman Group (NN/g)', loc:'Certification' },
        ].map((ed,i) => (
          <div key={i} style={{ display:'flex', gap:24, padding:'16px 0', borderBottom:'1px solid var(--border)', flexWrap:'wrap' }}>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:500, fontSize:14.5 }}>{ed.deg}</div>
              <div style={{ fontSize:13, color:'var(--ink2)', marginTop:2 }}>{ed.school}</div>
            </div>
            <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)' }}>{ed.loc}</div>
          </div>
        ))}
      </div>

    </div>
  );
}

// ── Writing Page ──────────────────────────────────────────────────────────
function WritingPage() {
  return (
    <div style={{ paddingTop:72, paddingBottom:96 }}>

      {/* Header */}
      <div style={{ marginBottom:64, paddingBottom:40, borderBottom:'1px solid var(--border)' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--ink3)', letterSpacing:'.1em', textTransform:'uppercase', marginBottom:16 }}>Writing</div>
        <h1 style={{ fontSize:'clamp(28px, 4vw, 44px)', fontWeight:300, letterSpacing:'-0.025em', lineHeight:1.15, maxWidth:560 }}>
          Notes on design, leadership & systems
        </h1>
      </div>

      {/* Editorial cards */}
      <div style={{ display:'grid', gap:24 }}>
        {WRITING.map((w, i) => {
          const [hov, setHov] = useState(false);
          return (
            <a key={i} href={w.href} target="_blank" rel="noopener"
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              className="writing-card"
              style={{
                display:'grid', gridTemplateColumns:'220px 1fr', gap:32,
                padding:28, borderRadius:20, border:'1px solid var(--border)',
                background: hov ? 'var(--bg2)' : 'var(--bg)',
                transition:'all .22s ease',
                transform: hov ? 'translateY(-2px)' : 'none',
                boxShadow: hov ? '0 12px 40px oklch(0% 0 0/0.07)' : 'none',
              }}>
              <img src={w.img} alt=""
                style={{ width:'100%', aspectRatio:'16/10', objectFit:'cover', borderRadius:12, display:'block' }} />
              <div style={{ display:'flex', flexDirection:'column', justifyContent:'space-between', minHeight:110 }}>
                <div>
                  <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14 }}>
                    {w.category && (
                      <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--accent)', background:'oklch(65% 0.16 55/0.08)', border:'1px solid oklch(65% 0.16 55/0.2)', borderRadius:20, padding:'3px 10px', letterSpacing:'.06em' }}>
                        {w.category}
                      </span>
                    )}
                    {w.readTime && (
                      <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--ink3)' }}>{w.readTime} read</span>
                    )}
                  </div>
                  <h3 style={{ fontSize:18, fontWeight:500, lineHeight:1.35, marginBottom:10, letterSpacing:'-0.01em' }}>{w.title}</h3>
                  <p style={{ fontSize:13.5, color:'var(--ink2)', lineHeight:1.7, textWrap:'pretty' }}>{w.excerpt}</p>
                </div>
                <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--accent)', marginTop:16, opacity: hov ? 1 : 0.6, transition:'opacity .2s' }}>
                  Read on Medium →
                </div>
              </div>
            </a>
          );
        })}
      </div>

    </div>
  );
}

// ── Contact Page ──────────────────────────────────────────────────────────
function ContactPage() {
  return (
    <div style={{ paddingTop:72, paddingBottom:96 }}>
      <section style={{ textAlign:'center', padding:'80px 0 96px' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--ink3)', marginBottom:20 }}>
          <span className="dot-pulse" style={{ marginRight:8 }} /> Available for hire
        </div>
        <h1 style={{ fontSize:'clamp(28px, 4vw, 44px)', fontWeight:300, letterSpacing:'-0.02em', marginBottom:12, lineHeight:1.15 }}>
          Interested in working together?
        </h1>
        <p style={{ color:'var(--ink2)', fontSize:15, marginBottom:32, maxWidth:460, margin:'0 auto 32px' }}>
          Real progress happens where clarity and execution align.
        </p>
        <div style={{ display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>
          <a href="mailto:hergottovak@gmail.com" style={{ background:'var(--ink)', color:'var(--bg)', padding:'12px 32px', borderRadius:10, fontSize:15, fontWeight:500, display:'inline-block', transition:'opacity .2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='.75'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}
          >Send a message</a>
          <a href="https://linkedin.com" target="_blank" rel="noopener" style={{ background:'none', color:'var(--ink)', padding:'12px 32px', borderRadius:10, fontSize:15, fontWeight:500, display:'inline-block', border:'1px solid var(--border)', transition:'all .2s' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--ink)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; }}
          >Connect on LinkedIn</a>
        </div>
        <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--ink3)', marginTop:20 }}>hergottovak@gmail.com</div>
      </section>

    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────
function App() {
  const tweaks = useTweaks();
  const [activePage, setActivePage] = useState('home');
  const [openItem, setOpenItem] = useState(null);

  const navigate = (page) => {
    setActivePage(page);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  return (
    <>
      <Sidebar activePage={activePage} onNavigate={navigate} />
      <div className="sidebar-layout" style={{ marginLeft:240 }}>
        <div style={{ padding:'0 40px' }}>

          {openItem && <WorkDetail item={openItem} onClose={() => setOpenItem(null)} />}

          <div key={activePage} className="page-enter">
            {activePage === 'home'       && <HomePage       tweaks={tweaks} onNavigate={navigate} onOpenWork={setOpenItem} />}
            {activePage === 'about'      && <AboutPage      />}
            {activePage === 'work'       && <WorkPage       tweaks={tweaks} onOpenWork={setOpenItem} />}
            {activePage === 'experience' && <ExperiencePage />}
            {activePage === 'writing'    && <WritingPage    />}
            {activePage === 'contact'    && <ContactPage    />}
          </div>

          <ScrollToTop />
        </div>
        <Footer />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
